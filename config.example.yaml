# AI News Digest — Configuration
# Generated by: python -m news_digest setup
# Docs: https://github.com/tolmachevmaxim/ai-news-digest

# --- Required ---

# Anthropic API key (get at https://console.anthropic.com)
anthropic_api_key: "sk-ant-..."

# Telegram bot token (get from @BotFather)
telegram_bot_token: "123456:ABC-DEF..."

# Telegram channel to post to (e.g., @mychannel or -1001234567890)
telegram_channel: "@mychannel"

# --- Topics & Feeds ---

# Your topics of interest (used for feed suggestions and relevance filtering)
topics:
  - "AI/ML"
  - "product management"
  - "startups"

# RSS/Atom feeds to monitor
feeds:
  TechCrunch AI: "https://techcrunch.com/category/artificial-intelligence/feed/"
  Hacker News AI: "https://hnrss.org/frontpage?q=AI&points=100"
  Reddit ML: "https://www.reddit.com/r/MachineLearning/hot/.rss"
  # Add your own feeds here

# Keywords for relevance filtering (items without these words get filtered out)
# Leave empty to keep all items from all feeds
keywords:
  - "ai"
  - "llm"
  - "machine learning"

# --- Digest Settings ---

# Language for the digest (ru / en)
language: "ru"

# Number of news items per digest (5-7 recommended)
digest_size: 7

# Hours to look back for news (48 = covers gaps if your machine was off)
lookback_hours: 48

# --- Models ---

# Model for selecting top news (fast + cheap)
selector_model: "claude-haiku-4-5-20251001"

# Model for writing the final post (quality)
writer_model: "claude-sonnet-4-20250514"

# --- Your Writing Style ---
# Generated during setup from your sample posts.
# The digest will match YOUR voice, not generic AI text.

style_profile: |
  Language: Russian, conversational
  Tone: Direct, informal, uses opinions
  Patterns: leads with facts, short sentences, tech terms in English
  Vocabulary: casual register
  Avoid: formal language, corporate speak

# Sample posts (used to learn your style during setup)
style_samples: []

# --- State ---

# Path to seen-URLs file (for deduplication)
state_file: "~/.config/news-digest/seen.json"

# Max URLs to remember
max_seen: 1000
